services:
  mysql:
    image: mysql:8
    container_name: survey-mysql
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  survey-backend:
    build:
      context: ./backend
    container_name: survey-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy

  survey-frontend:
    build:
      context: ./frontend
    container_name: survey-frontend   
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - survey-backend

  survey-admin:
    build:
      context: ./frontend_admin
    container_name: survey-admin
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - survey-backend

volumes:
  mysql_data:
